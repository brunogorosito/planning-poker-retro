name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-js:
    name: JS Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run client tests with coverage
        run: pnpm --filter client test:coverage

      - name: Run server tests with coverage
        run: pnpm --filter server test:coverage

      - name: Upload client coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/client/coverage/coverage-final.json
          flags: client
          name: client-coverage

      - name: Upload server coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/server/coverage/coverage-final.json
          flags: server
          name: server-coverage

  test-python:
    name: Python Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: packages/server-python
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Run Python tests with coverage
        working-directory: packages/server-python
        run: .venv/bin/pytest

      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/server-python/coverage.xml
          flags: server-python
          name: server-python-coverage
